name: Build Deltoid KX
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - name: compile
        run: |
          gcc -fPIC -shared injected_lib.c -o libdeltoid.so -ldl -lpthread
          gcc Injector.c -o deltoid_launcher
      - name: artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Deltoid-Bin
          path: |
            libdeltoid.so
            deltoid_launcher
            init.lua
